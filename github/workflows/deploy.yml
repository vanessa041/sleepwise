# Publica o SleepWise no GitHub Pages a cada push na branch main.
name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

# Evita dois deploys ao mesmo tempo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
